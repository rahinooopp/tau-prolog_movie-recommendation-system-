




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Movie Recommender Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e272e; color: #d2dae2; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #f1c40f; margin-bottom: 5px; }
        p { color: #808e9b; margin-bottom: 25px; font-size: 16px; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 900px; margin: 0 auto; }
        .panel { background-color: #2c3e50; padding: 20px; border-radius: 10px; flex: 1; min-width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .panel h3 { color: #0fb9b1; margin-top: 0; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 15px; }
        button { background-color: #0fb9b1; color: white; border: none; padding: 10px 15px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        button:hover { background-color: #2bcbba; }
        
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #34495e; padding: 10px; border-radius: 6px; }
        input, select { padding: 8px; border-radius: 4px; border: 1px solid #7f8c8d; background: #ecf0f1; width: 50%; }
        .input-group button { background-color: #f39c12; width: 35%; }
        .input-group button:hover { background-color: #f1c40f; color: black; }

        #results-container { background-color: #2c3e50; padding: 20px; border-radius: 10px; max-width: 900px; margin: 20px auto; min-height: 150px; text-align: left; }
        .movie-item { font-size: 16px; margin: 8px 0; padding: 10px; background-color: #34495e; border-radius: 6px; color: #ffdd59; border-left: 4px solid #f1c40f; }
        .loading { color: #f39c12; font-style: italic; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tau-prolog@0.3.2/modules/core.js"></script>
</head>
<body>

    <h1> Prolog Movie Recommender</h1>
   

    <div class="container">
        <div class="panel">
            <h3> Quick Filters</h3>
            <div class="btn-group">
                <button onclick="runQuery('masterpiece(Movie).', ' Masterpieces')"> Masterpieces</button>
                <button onclick="runQuery('high_rating(Movie).', ' High Rated')"> High Rated</button>
                <button onclick="runQuery('epic_movie(Movie).', ' Epic (Long)')"> Epic (Long)</button>
                <button onclick="runQuery('short_movie(Movie).', ' Short Movies')"> Short Movies</button>
                <button onclick="runQuery('popular_movie(Movie).', ' Popular (>300 votes)')"> Popular</button>
            </div>
        </div>

        <div class="panel">
            <h3> Custom Search</h3>
            
            <div class="input-group">
                <select id="genre-select">
                    <option value="drama">Drama</option>
                    <option value="comedy">Comedy</option>
                    <option value="adventure">Adventure</option>
                    <option value="thriller">Thriller</option>
                    <option value="animation">Animation</option>
                    <option value="romance">Romance</option>
                    <option value="horror">Horror</option>
                </select>
                <button onclick="searchGenre()">Search Genre</button>
            </div>

            <div class="input-group">
                <input type="text" id="director-input" placeholder="e.g. Peter Jackson">
                <button onclick="searchDirector()">Search Director</button>
            </div>

            <div class="input-group">
                <input type="number" id="year-input" placeholder="Released After (e.g. 2005)">
                <button onclick="searchYear()">Search Year</button>
            </div>
            
            <div class="input-group">
                <input type="number" id="rating-input" step="0.1" placeholder="Min Rating (e.g. 7.5)">
                <button onclick="searchRating()">Top Films</button>
            </div>
        </div>
    </div>

    <div id="results-container">
        <h3 id="result-title" style="color:#0fb9b1; border-bottom: 1px solid #34495e; padding-bottom:5px;">Results will appear here...</h3>
        <div id="movie-list"></div>
    </div>

    <script>
        var session = pl.create();
//prolog code

            film('Biutiful', 'Alejandro Gonzalez Inarritu', 2010, 'drama', 'others', 148, 'Spain', 'Javier Bardem', 7.6, 12).

            film('The Silence of the Lambs', 'Jonathan Demme', 1991, 'thriller', 'others', 118, 'USA', 'Anthony Hopkins', 8.2, 474).
            film('The Da Vinci Code', 'Ron Howard', 2006, 'thriller', 'others', 149, 'USA', 'Tom Hanks', 6.6, 447).

            film('The Others', 'Alejandro Amenabar', 2001, 'thriller', 'others', 101, 'Spain', 'Nicole Kidman', 7.4, 166).

            %animation
            film('Shrek', 'Andrew Adamson', 2001, 'animation', 'others', 90, 'USA', 'Mike Myers', 7.8, 604).
            film('Ice Age', 'Chris Wedge', 2002, 'animation', 'others', 81, 'USA', 'Cezary Pazura', 7.6, 359).
            film('The Lion King', 'Rob Minkoff', 1994, 'animation', 'others', 89, 'USA', 'Matthew Broderick', 8.3, 381).

            %romance

            film('Amélie', 'Jean-Pierre Jeunet', 2001, 'romance', 'others', 129, 'France', 'Audrey Tautou', 7.6, 203).
            film('Love Actually', 'Richard Curtis', 2003, 'romance', 'others', 135, 'UK', 'Colin Firth', 7.7, 173).
            film('Bridget Jones''s Diary', 'Sharon Maguire', 2001, 'romance', 'others', 97, 'UK', 'Renee Zellweger', 6.9, 204).
            film('Just Love Me', 'Ryszard Zatorski', 2006, 'romance', 'others', 98, 'Poland', 'Agnoszka Grochowska', 5.8, 137).
            film('Nigdy w zyciu!', 'Ryszard Zatorski', 2004, 'romance', 'others', 100, 'Poland', 'Danuta Stenka', 6.2, 129).

            %horror
            film('The Shining', 'Stanley Kubrick', 1980, 'horror', 'psychopaths', 146, 'USA', 'Jack Nicholson', 7.9, 293).
            film('I Am Legend', 'Francis Lawrence', 2007, 'horror', 'monsters', 101, 'Australia', 'Will Smith', 7.5, 344).
            film('Interview with the Vampire', 'Neil Jordan', 1994, 'horror', 'monsters', 123, 'USA', 'Brad Pitt', 7.8, 243).
            film('Alien', 'Ridley Scott', 1979, 'horror', 'monsters', 117, 'USA', 'Sigourney Weaver', 7.9, 211).

            film('Saw', 'James Wan', 2004, 'horror', 'psychopaths', 103, 'Australia', 'Tobin Bell', 6.7, 172).
            film('Final Destination', 'James Wong', 2000, 'horror', 'others', 98, 'Canada', 'Devon Sawa', 6.6, 158).
            film('The Ninth Gate', 'Roman Polanski', 1999, 'horror', 'others', 133, 'Francja', 'Johnny Depp', 7.3, 148).
            film('The Conjuring', 'James Wan', 2013, 'horror', 'ghosts', 112, 'USA', 'Vera Farmiga', 7.4, 116).
            film('The Orphanage', 'Juan Antonio Bayona', 2007, 'horror', 'ghosts', 105, 'Spain', 'Belen Rueda', 7.0, 119).
            film('The Rite', 'Mikael Hafstrom', 2011, 'horror', 'ghosts', 114, 'USA', 'Anthony Hopkins', 6.8, 84).

            % Rules
            movie(Title) :- film(Title, _, _, _, _, _, _, _, _, _).
            genre(Movie, Genre) :- film(Movie, _, _, Genre, _, _, _, _, _, _).
            rating(Movie, Value) :- film(Movie, _, _, _, _, _, _, _, Value, _).
            high_rating(Movie) :- rating(Movie, Value), Value >= 8.0.
            released_after(Movie, YearLimit) :- film(Movie, _, Year, _, _, _, _, _, _, _), Year > YearLimit.
            short_movie(Movie) :- film(Movie, _, _, _, _, Duration, _, _, _, _), Duration < 100.
            long_movie(Title, MinDuration) :- film(Title, _, _, _, _, Duration, _, _, _, _), Duration > MinDuration.
            classic_film(Title, MaxYear) :- film(Title, _, Year, _, _, _, _, _, _, _), Year =< MaxYear.
            top_film(MinRating, Title) :- film(Title, _, _, _, _, _, _, _, Rating, _), Rating >= MinRating.
            popular_movie(Movie) :- film(Movie, _, _, _, _, _, _, _, _, Votes), Votes > 300.
            masterpiece(Movie) :- high_rating(Movie), popular_movie(Movie).
            epic_movie(Movie) :- film(Movie, _, _, _, _, Duration, _, _, _, _), Duration > 150.
        `;

        session.consult(prologCode);

        //Linking UI to Prolog
        
        function searchGenre() {
            let genre = document.getElementById("genre-select").value;
            runQuery(`genre(Movie, '${genre}').`, `🎭 Movies in Genre: ${genre}`);
        }

        function searchDirector() {
            let director = document.getElementById("director-input").value.trim();
            if(!director) return alert("Please enter a director's name!");
            
            runQuery(`film(Movie, '${director}', _, _, _, _, _, _, _, _).`, `🎬 Directed by: ${director}`);
        }

        function searchYear() {
            let year = document.getElementById("year-input").value;
            if(!year) return alert("Please enter a year!");
            runQuery(`released_after(Movie, ${year}).`, `📅 Released After: ${year}`);
        }

        function searchRating() {
            let minRating = document.getElementById("rating-input").value;
            if(!minRating) return alert("Please enter a minimum rating!");
            runQuery(`top_film(${minRating}, Movie).`, `⭐ Top Films (Rating >= ${minRating})`);
        }

        
        function runQuery(queryStr, titleText) {
            let container = document.getElementById('movie-list');
            document.getElementById('result-title').innerText = titleText;
            container.innerHTML = "<span class='loading'>Searching Prolog database...</span>";
            
            session.query(queryStr);
            
            let found = false;
            let htmlOutput = "";

            session.answers(x => {
                if (x && x !== false) {
                    found = true;
                    
                    let variableName = x.links.Movie ? 'Movie' : (x.links.Title ? 'Title' : null);
                    if(variableName) {
                        let movieName = x.links[variableName].id.replace(/['"]+/g, ''); 
                        htmlOutput += `<div class='movie-item'>🎬 ${movieName}</div>`;
                    }
                }
            });

            setTimeout(() => {
                if(found) {
                    container.innerHTML = htmlOutput;
                } else {
                    container.innerHTML = "<div class='movie-item' style='border-color: #e74c3c; color:#e74c3c'>❌ No movies found for your search.</div>";
                }
            }, 300);
        }
    </script>
</body>
</html>
